# MigrationMerlin CI/CD pipeline.
#
# Every PR and every push to `main` runs three independent gates in
# parallel: `lint`, `format`, `test`.
#
# On push to `main` (and only on main), success of the gates triggers
# a single `release` job that bumps the `version` file, builds, packages,
# tags, pushes, and publishes a GitHub release.
#
# Design notes:
#   * Runner is `windows-latest` for authenticity -- this repo is a
#     Windows USMT wrapper and its Pester tests expect a Windows host.
#   * PowerShell 7 (`pwsh`) is used everywhere; it ships with the runner.
#   * Only one Node-based action is used: `actions/checkout@v5` (Node 24).
#     Module installation happens in-line via `Install-Module` each run;
#     release publishing uses the runner's pre-installed `gh` CLI via
#     shell steps rather than a Node-based release action.
#   * The `format` job is advisory (continue-on-error) on purpose: we
#     have not enforced Invoke-Formatter output on the existing tree
#     yet. Flip to `false` once the codebase has been formatted once.
#   * The version-bump commit message contains `[skip ci]` so the push
#     it generates does NOT recursively trigger another release.
#   * Tags are annotated (`git tag -a`) and pushed explicitly. The
#     default `GITHUB_TOKEN` is sufficient unless branch-protection on
#     `main` blocks github-actions[bot] pushes; in that case, add a PAT
#     secret named `RELEASE_TOKEN` and swap it into the `token:` field
#     of `actions/checkout` in the `release` job.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          Import-Module PSScriptAnalyzer -ErrorAction Stop
          (Get-Module PSScriptAnalyzer).Version.ToString()

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Settings .\PSScriptAnalyzerSettings.psd1 `
            -ExcludeRule PSUseCompatibleSyntax
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
          } else {
            Write-Host "PSScriptAnalyzer: no findings."
          }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) {
            Write-Host "::error::PSScriptAnalyzer reported $($errors.Count) error(s)."
            exit 1
          }

  format:
    name: Format check (advisory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          Import-Module PSScriptAnalyzer -ErrorAction Stop

      - name: Check Invoke-Formatter drift
        shell: pwsh
        run: |
          $targets = @()
          foreach ($d in @('modules','scripts','tests','.github/scripts','wrappers')) {
            if (Test-Path $d) {
              $targets += Get-ChildItem -Path $d -Recurse -Include *.ps1,*.psm1 -File
            }
          }
          foreach ($top in @('MigrationMerlin.ps1')) {
            if (Test-Path $top) { $targets += Get-Item $top }
          }
          $drift = 0
          foreach ($file in $targets) {
            $orig = Get-Content -LiteralPath $file.FullName -Raw
            if ($null -eq $orig) { continue }
            $fmt = Invoke-Formatter -ScriptDefinition $orig
            if ($orig -ne $fmt) {
              Write-Host "FORMAT DRIFT  $($file.FullName)"
              $drift++
            }
          }
          if ($drift -gt 0) {
            Write-Host "::warning::$drift file(s) differ from Invoke-Formatter output."
            exit 1
          }
          Write-Host "Format check: all files match formatter output."

  test:
    name: Pester tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Pester 5
        shell: pwsh
        run: |
          $existing = Get-Module Pester -ListAvailable | Where-Object { $_.Version -ge [version]'5.5.0' }
          if (-not $existing) {
            Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.5.0 -ErrorAction Stop
          }
          (Get-Module Pester -ListAvailable | Sort-Object Version -Descending | Select-Object -First 1).Version.ToString()

      - name: Run Pester suite
        shell: pwsh
        run: .\tests\Run-Tests.ps1 -CI -Output Normal

  release:
    name: Build, package, release
    runs-on: windows-latest
    needs: [lint, format, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: ver
        shell: pwsh
        run: |
          $next = .\.github\scripts\Get-NextVersion.ps1 -Write
          "version=$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Next version: $next"

      - name: Build
        shell: pwsh
        run: .\.github\scripts\Invoke-Build.ps1 -OutputDir dist

      - name: Package
        shell: pwsh
        run: |
          .\.github\scripts\Invoke-Package.ps1 `
            -InputDir dist `
            -OutputDir pkg `
            -Version "${{ steps.ver.outputs.version }}"
          Get-ChildItem pkg

      - name: Commit version bump, tag, and push
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "Bump version to $v [skip ci]"
          git tag -a $v -m "Release $v"
          git push origin HEAD:main
          git push origin "refs/tags/$v"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $zip = (Get-ChildItem pkg\*.zip | Select-Object -First 1).FullName
          if (-not $zip) { throw "No zip found in pkg/" }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @(
            "Rolling release built from commit ${{ github.sha }}."
            ""
            "Source: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          ) | Set-Content -Path $notesPath -Encoding utf8

          gh release create $v $zip `
            --title "MigrationMerlin $v" `
            --notes-file $notesPath
